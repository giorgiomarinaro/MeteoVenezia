name: Aggiorna dati meteomarini Venezia
# Ultimo tocco per forzare la ri-registrazione dello schedule: 2026-07-08

on:
  schedule:
    # Ogni 15 minuti, ma sfalsato rispetto ai minuti tondi (0/15/30/45) che sono
    # i più affollati sull'infrastruttura condivisa di GitHub Actions e quindi
    # i più soggetti a ritardi. Con :07/:22/:37/:52 si evita quel picco.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}  # permette di lanciarlo manualmente da GitHub

# Impedisce a due esecuzioni di girare in parallelo: se ne parte una nuova mentre
# una precedente non ha ancora finito, questa nuova aspetta in coda invece di
# rischiare un conflitto di push con la vecchia.
concurrency:
  group: fetch-meteomarini
  cancel-in-progress: false

permissions:
  contents: write  # serve per poter fare il commit/push

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scarica i JSON da dati.venezia.it
        run: |
          set -e
          mkdir -p data
          BASE_URL="https://dati.venezia.it/sites/default/files/dataset/opendata"

          # Elenco dei dataset che vogliamo salvare (aggiungine/togline a piacere)
          FILES=(
            livello
            vento
            pressione
            radiazione
            tempacqua
            umidita
            temparia
            onde_laguna
            onde_mare
            previsione
          )

          for f in "${FILES[@]}"; do
            echo "Scarico $f.json..."
            if curl -sL --fail --max-time 20 "$BASE_URL/$f.json" -o "data/$f.json"; then
              echo "OK: $f.json"
            else
              echo "ATTENZIONE: impossibile scaricare $f.json, mantengo la versione precedente"
            fi
          done

          # Timestamp dell'ultimo aggiornamento riuscito, utile da mostrare sul sito
          date -u +'{"last_updated": "%Y-%m-%dT%H:%M:%SZ"}' > data/last_updated.json

      - name: Commit e push (solo se qualcosa è cambiato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nessun cambiamento nei dati, salto il commit."
          else
            git commit -m "Aggiornamento dati meteomarini $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # Rete di sicurezza: se nel frattempo il remoto è avanzato, riallinea
            # la nostra modifica sopra l'ultimo commit remoto prima di pushare.
            git pull --rebase origin main
            git push
          fi
